server:
  port: 8554
  mount: /live
capture:
  device: /dev/video0
  width: 1280
  height: 720
  framerate: 30
  pixfmt: I420 # I420 UYVY
encoder:
  backend: x264          # vaapi | nvenc | v4l2m2m | x264
  bitrate_kbps: 4000
  gop: 30
  bframes: 0
pipeline:
  v4l2_nbuffers: 4         # 太少易掉帧, 太多增加延迟; 4-6 为佳
  encoder_buffers: 4       # 编码器输出端
  queue_max_buffers: 2     # GStreamer queue
  queue_leaky: downstream  # 满时丢老帧
filter:
  enable_f1: true
  enable_f3: false
  sigma_space: 4.0
  sigma_color: 0.10
  unsharp_amount: 0.5
  shader_dir: /home/ubuntu/Desktop/JW/vm_iot/shaders
log:
  level: info             # trace|debug|info|warn|err